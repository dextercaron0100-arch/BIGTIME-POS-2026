services:
  postgres:
    image: postgres:16-alpine
    container_name: bigtime-pos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-apex_pos}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in the root .env file}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the root .env file}
    ports:
      - "127.0.0.1:54329:5432"
    volumes:
      - bigtime_pos_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: bigtime-pos-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6380:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in the root .env file}
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - bigtime_pos_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD --no-auth-warning ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  bigtime_pos_postgres_data:
  bigtime_pos_redis_data:
